# Ingress — exposes the coordinator to external traffic via NGINX ingress controller.
# IMPORTANT: Update the host and TLS secret for your domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: search-ingress
  namespace: search
  labels:
    app.kubernetes.io/part-of: distributed-search
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"     # safe margin for cold starts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/limit-rps: "200"             # rate limit per client IP
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"        # TLS via cert-manager
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - search.yourdomain.com    # <-- CHANGE THIS
      secretName: search-tls
  rules:
    - host: search.yourdomain.com  # <-- CHANGE THIS
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coordinator
                port:
                  number: 8090
