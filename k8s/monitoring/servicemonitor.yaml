# Prometheus ServiceMonitor — scrapes /metrics on coordinator pods every 15s.
# Requires Prometheus Operator installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: coordinator-monitor
  namespace: search
  labels:
    app: coordinator
    app.kubernetes.io/part-of: distributed-search
spec:
  namespaceSelector:
    matchNames:
      - search
  selector:
    matchLabels:
      app: coordinator
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
