# etcd — used by register_shard() / get_shards() in distributed mode.
# In inprocess mode the coordinator doesn't query etcd for shard discovery,
# but running it costs near-zero resources and enables future distributed scaling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: search
  labels:
    app: etcd
    app.kubernetes.io/part-of: distributed-search
spec:
  serviceName: etcd-headless
  replicas: 3              # Scale to 3 for production HA
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.12
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          env:
            - name: ETCD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://$(ETCD_NAME).etcd-headless.search.svc.cluster.local:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:2380"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://$(ETCD_NAME).etcd-headless.search.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER
              value: >-
                etcd-0=http://etcd-0.etcd-headless.search.svc.cluster.local:2380,
                etcd-1=http://etcd-1.etcd-headless.search.svc.cluster.local:2380,
                etcd-2=http://etcd-2.etcd-headless.search.svc.cluster.local:2380
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "search-cluster"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "104857600"
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: etcd-data
              mountPath: /default.etcd
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: YOUR_FAST_RWO_STORAGECLASS  # gp3 on AWS, standard-rwo on GKE, managed on AKS, local-path on bare metal
        resources:
          requests:
            storage: 2Gi
---
# Headless service for stable DNS names (etcd-0.etcd-headless.search.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: search
  labels:
    app: etcd
spec:
  clusterIP: None
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380
