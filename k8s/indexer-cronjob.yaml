# Indexer CronJob — rebuilds the full search index every night at 2AM.
#
# This runs the rebuild-index.sh script which orchestrates:
#   1. ingester.py: XML → 8 sharded JSONL files
#   2. indexer.py × 8: JSONL → 8 Tantivy index partitions with embeddings
#
# The coordinator's refresh_partitions_task() picks up the new index
# data within 30 seconds — zero downtime.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: index-rebuild
  namespace: search
  labels:
    app.kubernetes.io/part-of: distributed-search
spec:
  schedule: "0 2 * * *"        # Every night at 2AM UTC
  concurrencyPolicy: Forbid    # Never run two rebuilds simultaneously
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400   # 4 hour timeout
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: indexer
              image: distributed-search-coord:latest  # <-- CHANGE to your registry
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "/app/scripts/rebuild-index.sh", "/data/wikipedia.xml", "/app/indices/search.idx", "8"]
              env:
                - name: EMBED_PROVIDER
                  value: "local"
                - name: MAX_DOCS
                  value: "0"                  # 0 = index everything
                - name: BATCH_SIZE
                  value: "2000"
                - name: PYTHONPATH
                  value: "/app"
              resources:
                requests:
                  cpu: "4"
                  memory: "4Gi"
                limits:
                  cpu: "8"
                  memory: "8Gi"
              volumeMounts:
                - name: search-index
                  mountPath: /app/indices
                - name: tmp-shards
                  mountPath: /tmp/shards
                - name: raw-data
                  mountPath: /data
                  readOnly: true
          volumes:
            - name: search-index
              persistentVolumeClaim:
                claimName: search-index-pvc
            - name: tmp-shards
              emptyDir:
                sizeLimit: 10Gi
            - name: raw-data
              persistentVolumeClaim:
                claimName: raw-data-pvc

