# HPA — auto-scale coordinator replicas based on CPU/memory utilization.
# At 70% CPU → add a replica. Scale between 2 (HA minimum) and 6.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coordinator-hpa
  namespace: search
  labels:
    app.kubernetes.io/part-of: distributed-search
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coordinator
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30     # scale up fast on load spikes
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
