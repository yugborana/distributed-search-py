# Coordinator — the heart of the search engine.
# Runs SHARD_MODE=inprocess: loads all 8 Tantivy partitions via PartitionManager.
# Zero network hop for searches — pure ThreadPoolExecutor parallelism.
#
# Finding 6 note: readOnly is NOT set on the PVC mount because Tantivy's
# index.reload() may need to read lock files and segment metadata.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: search
  labels:
    app: coordinator
    app.kubernetes.io/part-of: distributed-search
spec:
  replicas: 2                # 2 replicas for HA; both read same RWX PVC
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime rollout
      maxSurge: 1
  selector:
    matchLabels:
      app: coordinator
  template:
    metadata:
      labels:
        app: coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      priorityClassName: high-priority
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: coordinator
      # Never schedule both coordinators on the same node (HA)
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: coordinator
              topologyKey: kubernetes.io/hostname

      initContainers:
        - name: copy-index
          image: distributed-search-coord:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Copying index from NFS → local emptyDir..."
              cp -r /nfs-index/search.idx-* /local-index/ 2>/dev/null || true
              echo "Copy complete."
          volumeMounts:
            - name: search-index-nfs    # NFS PVC (source)
              mountPath: /nfs-index
              readOnly: true
            - name: search-index-local  # emptyDir (dest, fast)
              mountPath: /local-index

      containers:
        - name: index-syncer
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                sleep 300
                echo "Syncing index..."
                cp -ru /nfs-index/search.idx-* /local-index/ 2>/dev/null || true
              done
          volumeMounts:
            - name: search-index-nfs
              mountPath: /nfs-index
              readOnly: true
            - name: search-index-local
              mountPath: /local-index

        - name: coordinator
          image: distributed-search-coord:latest   # <-- CHANGE to your registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http

          envFrom:
            - configMapRef:
                name: search-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password

          resources:
            requests:
              cpu: "2"          # PartitionManager uses 8 threads; 2 core minimum
              memory: "2Gi"     # 8 × ~120MB index shards + ONNX model (~150MB)
            limits:
              cpu: "4"
              memory: "4Gi"

          volumeMounts:
            - name: search-index-local  # reads from local emptyDir
              mountPath: /app/indices

          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60     # ONNX model + 8 index loads take ~30-50s
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 2



      volumes:
        - name: search-index-nfs
          persistentVolumeClaim:
            claimName: search-index-pvc
        - name: search-index-local
          emptyDir: {}                  # node-local, ephemeral, fast
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: search
  labels:
    app: coordinator
spec:
  selector:
    app: coordinator
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
