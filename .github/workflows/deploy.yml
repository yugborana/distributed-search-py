name: Build and Deploy Search Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: distributed-search-coord

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push coordinator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.coord
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update deployment images
        run: |
          kubectl set image deployment/coordinator \
            coordinator=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            copy-index=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n search
          kubectl set image cronjob/index-rebuild \
            indexer=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n search
          kubectl rollout status deployment/coordinator -n search --timeout=180s

      - name: Smoke test
        run: |
          # Wait for readiness probe to pass
          kubectl wait --for=condition=ready pod -l app=coordinator -n search --timeout=120s

          # Get coordinator pod and port-forward for smoke test
          POD=$(kubectl get pod -n search -l app=coordinator -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n search "$POD" 8090:8090 &
          sleep 3

          # Health check
          curl --retry 5 --retry-connrefused --retry-delay 2 -sf http://localhost:8090/health
          echo "Health check passed"

          # Search check
          curl --retry 5 --retry-connrefused --retry-delay 2 -sf "http://localhost:8090/search?q=test&limit=5" | python3 -m json.tool
          echo "Search smoke test passed"

          # Metrics check
          curl --retry 5 --retry-connrefused --retry-delay 2 -sf http://localhost:8090/metrics | head -5
          echo "Metrics endpoint passed"
