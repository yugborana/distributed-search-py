services:
  # Single etcd node
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd0
    environment:
      - ETCD_NAME=etcd0
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=search-cluster
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_QUOTA_BACKEND_BYTES=104857600
      - ETCD_AUTO_COMPACTION_RETENTION=1
    ports:
      - "2379:2379"
    networks:
      - search-net
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    networks:
      - search-net
    deploy:
      resources:
        limits:
          memory: 160M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s

  # ── Coordinator (in-process partition sharding) ──────────────────────────
  # PERF-13: All 8 Tantivy partitions loaded in-process.
  # Zero TCP socket overhead — searches go directly to ThreadPoolExecutor.
  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.coord
    image: distributed-search-coord:latest
    container_name: coordinator
    ports:
      - "8090:8090"
    environment:
      - ETCD_HOSTS=etcd
      - REDIS_HOST=redis
      - EMBED_PROVIDER=local
      - FUSION_ALPHA=0.5
      - PYTHONPATH=/app
      - SHARD_MODE=inprocess
      - INDEX_BASE=/app/search.idx
      - NUM_PARTITIONS=8
    command: ["--port", "8090", "--etcd-host", "etcd", "--redis-host", "redis"]
    volumes:
      - ./search.idx-0:/app/search.idx-0
      - ./search.idx-1:/app/search.idx-1
      - ./search.idx-2:/app/search.idx-2
      - ./search.idx-3:/app/search.idx-3
      - ./search.idx-4:/app/search.idx-4
      - ./search.idx-5:/app/search.idx-5
      - ./search.idx-6:/app/search.idx-6
      - ./search.idx-7:/app/search.idx-7
    networks:
      - search-net
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  search-net:
    driver: bridge
