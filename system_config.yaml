# Distributed Search — System Configuration

shards:
  count: 8
  routing: "md5"

index:
  dimension: 384              # embedding dimension (all-minilm)

embedding:
  provider: "ollama"
  model: "all-minilm"

storage:
  backend: "local"
  path: "/data/shards"

cache:
  redis_ttl: 300
  hybrid_ttl: 60
  vector_cache_ttl: 3600

coordinator:
  port: 8090
  shard_timeout: 5.0
  max_connections: 200
  fusion_alpha: 0.5
